version: "3.8"

services:
  sci-copilot:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Optional: after `cp backend/.env.example backend/.env` and filling keys, uncomment:
    # env_file:
    #   - ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-development}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped
